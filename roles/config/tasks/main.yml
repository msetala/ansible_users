- name: create group "it"
  ansible.builtin.group: 
    name: it
    state: present
    
 
- name: create anssi account
  ansible.builtin.user:
     name: anssi
     password: "{{ '%s' | format(password) | regex_replace('\n', '') | password_hash('sha512') }}"
     update_password: on_create
     state: present
     shell: /bin/bash
     home: /home/anssi
     groups: it
     uid: 2002
     append: yes
     

- name: create ansible environment for anssi
  ansible.builtin.file:
     path: "{{ folder }}"
     state: directory
     owner: "{{ user }}"
     group: it
     mode: '0755'

- name: add note for environment
  ansible.builtin.copy: 
    src:  helloansible.txt
    dest: /home/anssi/ansible/welcome.txt
    mode: '0755'
    

- name: Add SSH key
  ansible.posix.authorized_key:
    user: anssi
    key: "{{ lookup('file', '~/.ssh/id_ed25519.pub') }}"

- name: Allow sudo without password
  copy:
    dest: /etc/sudoers.d/anssi
    content: "%it ALL=(ALL) NOPASSWD: ALL"
    mode: '0440'
