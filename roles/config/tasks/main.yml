- name: create group "it"
  ansible.builtin.group: 
    name: it
    state: present
    
 
- name: create anssi account
  ansible.builtin.user:
     name: anssi
     password: "{{ '%s' | format(password) | regex_replace('\n', '') | password_hash('sha512') }}"
     update_password: on_create
     state: present
     shell: /bin/bash
     home: /home/anssi
     groups: it
     uid: 2002
     append: yes
     

- name: create ansible environment for anssi
  ansible.builtin.file:
     path: "{{ folder }}"
     state: directory
     owner: "{{ user }}"
     group: it
     mode: '0755'
